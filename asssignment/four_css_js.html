<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #1a0f2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            padding-top: 50px;
        }

        .btn-group { margin-bottom: 30px; }

        button {
            padding: 10px 20px;
            margin: 0 5px;
            background-color: #a259ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #d291ff; }

        .container {
            position: relative;
            width: 300px;
            height: 200px;
        }

        .box {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            border: 2px solid rgba(255,255,255,0.2);
           
            transition: z-index 0.01s;
        }

        #box1 { background-color: #4c1d95; z-index: 3; }
        #box2 { background-color: #6d28d9; z-index: 2; }
        #box3 { background-color: #8b5cf6; z-index: 1; }

    </style>
</head>
<body>

    <div class="btn-group">
        <button onclick="bringToFront('box1')">Layer 1</button>
        <button onclick="bringToFront('box2')">Layer 2</button>
        <button onclick="bringToFront('box3')">Layer 3</button>
    </div>

    <div class="container">
        <div id="box1" class="box">1: Education</div>
        <div id="box2" class="box">2: Skills</div>
        <div id="box3" class="box">3: Experience</div>
    </div>

    <script>
        function bringToFront(selectedId) {
            
            const boxes = document.querySelectorAll('.box');

            boxes.forEach(box => {
                box.style.zIndex = "1";
            });

          
            document.getElementById(selectedId).style.zIndex = "10";
        }
    </script>

</body>
</html>
